# gateway는 S3에서 채운다. 백엔드 3종은 워크스페이스 루트 컨텍스트로 빌드 (S2).
services:
  # gateway: (S3에서 활성화 — build/image 없는 서비스는 compose 검증 실패)
  #   build: gateway/
  #   ports:
  #     - "8000:8000"
  ticket-server:
    build:
      context: .
      dockerfile: servers/ticket/Dockerfile
    ports:
      - "8101:8101"
  docs-server:
    build:
      context: .
      dockerfile: servers/docs/Dockerfile
    ports:
      - "8102:8102"
  ops-server:
    build:
      context: .
      dockerfile: servers/ops/Dockerfile
    ports:
      - "8103:8103"
