# 뼈대만 — 서비스 4개 자리 예약. image/build는 S2(서버 3종)/S3(gateway)에서 Dockerfile과 함께 채운다.
services:
  gateway:
    # build: gateway/        (S3)
    ports:
      - "8000:8000"
  ticket-server:
    # build: servers/ticket/ (S2)
    ports:
      - "8101:8101"
  docs-server:
    # build: servers/docs/   (S2)
    ports:
      - "8102:8102"
  ops-server:
    # build: servers/ops/    (S2)
    ports:
      - "8103:8103"
