# 4서비스 — gateway(S3) + 백엔드 3종(S2). 전부 워크스페이스 루트 컨텍스트로 빌드.
services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      BACKEND_TICKET_URL: http://ticket-server:8101/mcp
      BACKEND_DOCS_URL: http://docs-server:8102/mcp
      BACKEND_OPS_URL: http://ops-server:8103/mcp
      # 데모값 — 실제 운영 secret은 레포에 두지 않는다 (README 참조)
      GATEWAY_JWT_SECRET: demo-secret-do-not-use-in-prod
      GATEWAY_AUDIT_PATH: /app/audit/audit.jsonl
    # hard 의존 아님 — 기동 시 죽어 있는 백엔드는 지연 재집계로 처리
    depends_on:
      - ticket-server
      - docs-server
      - ops-server
  ticket-server:
    build:
      context: .
      dockerfile: servers/ticket/Dockerfile
    ports:
      - "8101:8101"
  docs-server:
    build:
      context: .
      dockerfile: servers/docs/Dockerfile
    ports:
      - "8102:8102"
  ops-server:
    build:
      context: .
      dockerfile: servers/ops/Dockerfile
    ports:
      - "8103:8103"
